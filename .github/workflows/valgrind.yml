name: Valgrind

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  valgrind:
    name: Valgrind memory check
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias con Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make python3 libssl-dev valgrind

      - name: Compilar proyecto
        run: |
          make clean
          make

      - name: Ejecutar Valgrind
        run: |
          make test-valgrind

      - name: Limpiar artefactos locales
        run: |
          make clean
          git status --short
