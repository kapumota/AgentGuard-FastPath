name: AGFast Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, tests and evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias base
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make python3 libssl-dev

      - name: Compilar proyecto
        run: |
          make clean
          make

      - name: Ejecutar pruebas principales
        run: |
          make test-fastpath
          make test-regression
          make test-streaming
          make test-guardsketch
          make test-unit

      - name: Ejecutar evaluacion experimental reproducible
        env:
          AGFAST_EVAL_EVENTS: "10000"
          AGFAST_EVAL_PIDS: "300"
          AGFAST_EVAL_DIR: "/tmp/agfast_ci_evaluacion"
        run: |
          bash scripts/run_evaluation.sh

      - name: Limpiar artefactos locales
        run: |
          make clean
          git status --short
