name: AgentGuard-C CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev python3 valgrind

      - name: Compilar
        run: |
          make clean
          make

      - name: Ejecutar pruebas
        run: |
          make test-fastpath

      - name: Ejecutar benchmark básico
        run: |
          make benchmark-csv

      - name: Revisar fugas de memoria con Valgrind
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./bin/agfast --version

      - name: Subir binarios
        uses: actions/upload-artifact@v4
        with:
          name: agentguard-fastpath-binaries
          path: |
            bin/agentguard
            bin/agfast

  security-scan:
    name: CodeQL and Semgrep
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      actions: read
      security-events: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev python3

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp

      - name: Compilar para CodeQL
        run: |
          make clean
          make

      - name: Analizar con CodeQL
        uses: github/codeql-action/analyze@v3

      - name: Ejecutar Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
